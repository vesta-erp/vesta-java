spring:
  application:
    name: vesta-api
  datasource:
    url: ${DB_VESTA_URL:jdbc:oracle:thin:@localhost:1521/XEPDB1}
    username: ${DB_VESTA_USER:vesta}
    password: ${DB_VESTA_PASSWORD:vesta}
    driver-class-name: oracle.jdbc.OracleDriver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=300s
  ai:
    azure:
      openai:
        api-key: ${AZURE_OPENAI_API_KEY:}
        endpoint: ${AZURE_OPENAI_ENDPOINT:}
        chat:
          options:
            deployment-name: ${AZURE_OPENAI_DEPLOYMENT:gpt-4o}
            temperature: 0.3
            max-tokens: 1000

server:
  port: 8080

jwt:
  secret: ${Jwt__SecretKey:vesta-super-secret-key-do-not-use-in-production-min-256-bits}
  expiration-ms: 86400000

vesta:
  dotnet-service:
    url: ${DOTNET_URL:http://localhost:5000}

logging:
  level:
    br.com.fiap.vesta: INFO
    org.springframework.security: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,info
